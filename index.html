<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MindSnap privacy policy for journal, goals, reminders, iCloud sync, Apple Health, speech, widgets, and app settings.">
    <title>MindSnap Privacy Policy</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        :root {
            --ink: #1d1d1f;
            --muted: #5f6066;
            --soft: #f6f4f8;
            --card: #ffffff;
            --line: #e9e5ee;
            --purple: #5b21b6;
            --purple-2: #8b5cf6;
            --pink: #db2777;
            --blue: #0ea5e9;
            --green: #059669;
            --orange: #ea580c;
            --red: #dc2626;
            --shadow: 0 16px 44px rgba(38, 22, 56, 0.11);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.16), transparent 28rem),
                linear-gradient(180deg, #fbf8ff 0%, #f6f4f8 42%, #f8fafc 100%);
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        a {
            color: inherit;
        }

        .hero {
            color: white;
            min-height: 420px;
            padding: 42px 20px 72px;
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(74, 0, 128, 0.96), rgba(194, 24, 91, 0.93)),
                url("data:image/svg+xml,%3Csvg width='160' height='160' viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(255,255,255,0.15)' stroke-width='1'%3E%3Cpath d='M0 80h160M80 0v160'/%3E%3Ccircle cx='80' cy='80' r='36'/%3E%3C/g%3E%3C/svg%3E");
            background-size: auto, 160px 160px;
        }

        .hero-inner {
            max-width: 980px;
            margin: 0 auto;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 70px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.17);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
            overflow: hidden;
        }

        .brand-mark img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
